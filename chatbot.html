<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Chatbot Engine | RoboRide</title>
    <style>
      .chip { background: rgba(0, 229, 255, 0.1); color: var(--primary); padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.9rem; cursor: pointer; border: 1px dashed rgba(0,229,255,0.4); transition: 0.3s; font-weight:600; }
      .chip:hover { background: var(--primary); color: #000; }
      .msg-bot-cnt { display:flex; gap:1rem; align-items:flex-end; align-self:flex-start; margin-bottom: 0.5rem; }
      .msg-usr-cnt { display:flex; gap:1rem; align-items:flex-end; align-self:flex-end; margin-bottom: 0.5rem; flex-direction:row-reverse; }
      .avatar { width:40px; height:40px; border-radius:50%; background:var(--primary); display:flex; align-items:center; justify-content:center; color:#000; font-weight:bold; font-size:1.2rem; flex-shrink:0;}
      .avatar-u { background:#333; color:#fff; border: 1px solid #555; }
    </style>
  </head>
  <body>
    <div id="navbar-container"></div>
    <div class="container" style="padding-top:8rem; padding-bottom:5rem; display:flex; flex-direction:column; min-height:100vh;">
      <h1 class="text-gradient" style="text-align:center; margin-bottom: 0.5rem;">AI Assistant</h1>
      <p class="text-muted" style="text-align:center; margin-bottom:2rem;">Your dedicated neural link to the RoboRide Network.</p>
      
      <div class="glass-panel" style="max-width:900px; width:100%; margin:0 auto; padding:0; flex:1; display:flex; flex-direction:column; border:1px solid rgba(0,229,255,0.2); box-shadow:0 0 50px rgba(0,229,255,0.05); border-radius: 16px; overflow:hidden;">
         
         <div style="background: rgba(0,0,0,0.4); padding: 1.5rem 2rem; border-bottom: 1px solid rgba(255,255,255,0.05); display:flex; align-items:center; gap: 1rem;">
             <div class="avatar" style="box-shadow: 0 0 15px rgba(0,229,255,0.5);">V</div>
             <div>
                <h3 style="margin:0;">Voxa Engine</h3>
                <div style="color:var(--primary); font-size:0.8rem; display:flex; align-items:center; gap:0.5rem;"><div style="width:8px; height:8px; background:var(--primary); border-radius:50%; box-shadow: 0 0 10px var(--primary);"></div> Online</div>
             </div>
         </div>

         <div id="fc-body" style="flex:1; display:flex; flex-direction:column; gap:1.5rem; overflow-y:auto; padding: 2rem;">
            
            <div class="msg-bot-cnt">
               <div class="avatar">V</div>
               <div style="background:rgba(0,229,255,0.1); padding:1rem 1.5rem; border-radius:12px 12px 12px 0; color:#fff; font-family:'Inter', sans-serif; max-width:80%;">Systems locked. I am Voxa, your primary mobility architect.</div>
            </div>

            <div style="display:flex; gap:0.5rem; margin-left: 56px; flex-wrap:wrap;" id="chip-container">
                <div class="chip">Show me EV bikes</div>
                <div class="chip">What is the price?</div>
                <div class="chip">Best top bikes</div>
                <div class="chip">Home page link</div>
            </div>

         </div>

         <div style="padding: 1.5rem 2rem; background: rgba(0,0,0,0.6); border-top: 1px solid rgba(255,255,255,0.05);">
             <div style="display:flex; gap:1rem;">
                <input type="text" id="fc-in" placeholder="Ask Voxa..." style="flex:1; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:#fff; padding:1.2rem; border-radius:12px; font-size:1.1rem; outline:none;" />
                <button class="btn btn-primary" id="fc-send" style="padding: 0 2rem; border-radius:12px;">Ping</button>
             </div>
         </div>

      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
         const btn = document.getElementById('fc-send');
         const inp = document.getElementById('fc-in');
         const bod = document.getElementById('fc-body');
         const chips = document.querySelectorAll('.chip');
         const chipCont = document.getElementById('chip-container');

         inp.addEventListener('keypress', (e) => {
             if(e.key === 'Enter') {
                 e.preventDefault();
                 btn.click();
             }
         });

         const triggerChat = (val) => {
             const uDiv = document.createElement('div');
             uDiv.className = 'msg-usr-cnt';
             
             // Using backticks for absolute guaranteed multi-line JS string safety
             const rawUserHtml = `
                <div class="avatar avatar-u">U</div>
                <div style="background:rgba(255,255,255,0.05); padding:1rem 1.5rem; border-radius:12px 12px 0 12px; color:var(--primary); font-family: 'Inter', sans-serif; max-width:80%;">
                   ${val}
                </div>
             `;
             uDiv.innerHTML = rawUserHtml;
             bod.appendChild(uDiv);
             bod.scrollTop = bod.scrollHeight;

             setTimeout(() => {
                const q = val.toLowerCase();
                let r = 'Acknowledged. My neural net is processing your parameters.';
                
                if(q.includes('price') || q.includes('cost') || q.includes('rate')) {
                    r = 'Pricing starts at &#8377;80,000 for standard combustion and scales up to &#8377;29,00,000 for our flagship conceptual robotic models (Hyperion X).';
                } else if(q.includes('ev') || q.includes('electric') || q.includes('robotic')) {
                    r = 'Our EV and Robotic lineups are world-class. Discover favorites like the Ather 450X, Ola S1 Pro, and the concept Tesla CyberMoto in our Catalog.';
                } else if(q.includes('home')) {
                    r = 'Navigate back to core operations via the <a href="/home.html" style="color:var(--primary); font-weight:bold; text-decoration:underline;">Home Terminal</a>.';
                } else if(q.includes('name of bikes') || q.includes('top best') || q.includes('best once') || q.includes('top')) {
                    r = 'The absolute pinnacle of our fleet includes the <a href="/product-detail.html?id=11" style="color:var(--primary); font-weight:bold;">Tesla CyberMoto</a>, <a href="/product-detail.html?id=28" style="color:var(--primary); font-weight:bold;">Apex DroneBike</a>, and the <a href="/product-detail.html?id=22" style="color:var(--primary); font-weight:bold;">Neural Glider</a>.';
                } else if (q.includes('hello') || q.includes('hi ') || q === 'hi' || q.includes('hey')) {
                    r = 'Hello! I am Voxa, your intelligent AI. How can I assist you?';
                }

                const bDiv = document.createElement('div');
                bDiv.className = 'msg-bot-cnt';
                
                const rawBotHtml = `
                   <div class="avatar">V</div>
                   <div style="background:rgba(0,229,255,0.1); padding:1rem 1.5rem; border-radius:12px 12px 12px 0; color:#fff; font-family: 'Inter', sans-serif; max-width:80%;">
                      ${r}
                   </div>
                `;
                bDiv.innerHTML = rawBotHtml;
                bod.appendChild(bDiv);
                bod.scrollTop = bod.scrollHeight;
             }, 800);
         };

         if(btn) {
           btn.addEventListener('click', () => {
             const v = inp.value.trim();
             if(!v) return;
             inp.value = '';
             if(chipCont) chipCont.style.display = 'none';
             triggerChat(v);
           });
         }

         chips.forEach(chip => {
             chip.addEventListener('click', (e) => {
                 if(chipCont) chipCont.style.display = 'none';
                 triggerChat(e.target.innerText);
             });
         });
      });
    </script>
  </body>
</html>
