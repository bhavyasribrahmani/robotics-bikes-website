<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RoboRide | Payment</title>
  </head>
  <body>
    <div id="navbar-container"></div>
    <div class="container" style="padding-top: 10rem; min-height: 100vh;">
      <h1 class="text-gradient">Select Payment Method</h1>
      <div style="margin-top: 4rem; max-width: 600px; display: flex; flex-direction: column; gap: 1.5rem;">
        <button class="glass-panel" style="padding: 2rem; text-align: left; font-size: 1.3rem; display: block; width: 100%; color: #fff; border: 1px solid var(--surface-border); transition: 0.3s;" onmouseover="this.style.background='rgba(0,229,255,0.1)'" onmouseout="this.style.background='var(--surface-color)'" onclick="alert('This authentication is in progress for any further process contact here: +91 9876543210')">UPI / Net Banking</button>
        <button class="glass-panel" style="padding: 2rem; text-align: left; font-size: 1.3rem; display: block; width: 100%; color: #fff; border: 1px solid var(--surface-border); transition: 0.3s;" onmouseover="this.style.background='rgba(0,229,255,0.1)'" onmouseout="this.style.background='var(--surface-color)'" onclick="alert('This authentication is in progress for any further process contact here: +91 9876543210')">Cash on Delivery</button>
        <button class="glass-panel" style="padding: 2rem; text-align: left; font-size: 1.3rem; display: block; width: 100%; color: #fff; border: 1px solid var(--surface-border); transition: 0.3s;" onmouseover="this.style.background='rgba(0,229,255,0.1)'" onmouseout="this.style.background='var(--surface-color)'" onclick="alert('This authentication is in progress for any further process contact here: +91 9876543210')">Visit Showroom at Location</button>
      </div>
      <div style="margin-top: 3rem;">
        <a href="javascript:history.back()" class="btn" style="color: var(--text-muted); padding: 1rem; border: 1px solid rgba(255,255,255,0.1);">← Go Back</a>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
