<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RoboRide | Engine Space</title>
  </head>
  <body>
    <div id="navbar-container"></div>
    <div class="hero-section">
      <img src="/hero-bg.png" class="hero-bg" alt="Hero Background">
      <div class="hero-gradient-overlay"></div>
      
      <div class="container hero-content animate-fade-in">
        <h1 class="text-gradient">Ride the Future</h1>
        <p class="text-muted" style="font-size: clamp(1.2rem, 3vw, 2rem); margin-top: 1rem; margin-bottom: 3rem; font-weight:300;">With Intelligent Machines.</p>
        <a href="#explore" class="btn btn-primary">Engage Catalog</a>
      </div>

      <div class="scroll-indicator animate-bounce">
         <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </div>
    </div>

    <!-- Product Flow Section -->
    <div class="container reveal-on-scroll" id="explore" style="padding-top:6rem; padding-bottom:10rem;">
        
        <h2 style="text-align:center; margin-bottom: 3rem;">Terminal <span class="text-gradient">Fleet</span></h2>
        
        
        <!-- Search Bar -->
        <div style="display:flex; justify-content:center; margin-bottom: 3rem;">
            <input type="text" id="search-input" placeholder="Search by name, brand..." class="glass-panel" style="width: 100%; max-width: 600px; padding: 1.5rem; font-size: 1.2rem; color: #fff; border: 1px solid var(--primary); box-shadow: 0 0 15px rgba(0,229,255,0.1);">
        </div>

        <!-- Filter Controls -->
        <div class="category-filters" id="filter-container">
            <button class="category-btn active" data-filter="All">All Fleet</button>
            <button class="category-btn" data-filter="Motorcycles">Motorcycles</button>
            <button class="category-btn" data-filter="Scooty">Scooty</button>
            <button class="category-btn" data-filter="EV Bikes">EV Bikes</button>
            <button class="category-btn" data-filter="Normal Bikes">Normal Bikes</button>
            <button class="category-btn" data-filter="High Rating">4-5 Rating</button>
            <button class="category-btn" data-filter="Top Brands">Best Brands</button>
        </div>


        <!-- Render Target -->
        <div class="product-grid" id="product-grid-container">
            <!-- Populated via Javascript -->
        </div>

    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
