<!doctype html>
<html lang="en">
  <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Combustion Analytics | RoboRide</title></head>
  <body>
    <div id="navbar-container"></div>
    <div class="container" style="padding-top:10rem; padding-bottom:5rem;">
      <h1 class="text-gradient" style="margin-bottom: 0.5rem;">Combustion Analytics</h1>
      <p class="text-muted" style="font-size:1.2rem; margin-bottom: 3rem;">Live inventory access.</p>

    </div>
    <script>window.dedicatedFilter = "Normal Bikes";</script>
    <script type="module" src="/src/main.js"></script>
  </body>
